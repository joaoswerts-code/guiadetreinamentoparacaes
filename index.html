<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guia de Treinamento para Cães</title>

  <style>
    :root{
      --bg:#ffffff;
      --bg-soft:#fffaf0;
      --card:#ffffff;
      --line:#f3e8c8;
      --text:#142019;
      --muted:#5f7464;

      /* 🔥 COR PRINCIPAL DOURADA */
      --primary:#d4af37;
      --primary-dark:#b8962e;
      --primary-soft:#fff7d6;

      --green:#d4af37;
      --green-soft:#fff7d6;

      --yellow:#facc15;

      --shadow:0 18px 60px rgba(15,23,42,.08);
      --shadow-strong:0 20px 50px rgba(212,175,55,.18);

      --max:1120px;
    }

    .topbar{
      background:linear-gradient(90deg, var(--primary-dark), var(--primary));
      color:#fff;
      text-align:center;
      padding:11px 14px;
      font-size:13px;
      font-weight:800;
    }

    .highlight{
      color:var(--primary);
    }

    .check{
      background:var(--green-soft);
      color:var(--green);
    }

    .btn-primary{
      background:linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
      color:#fff;
      box-shadow:0 14px 28px rgba(212,175,55,.22);
    }

    .offer-card{
      background:linear-gradient(135deg, #fff7d6 0%, #ffffff 40%, #fffaf0 100%);
      border:2px solid #f3e8c8;
    }

    .offer-card::before{
      background:var(--primary);
    }

    .offer-seal{
      border:1px solid #f3e8c8;
      color:var(--primary-dark);
    }

    .price-currency,
    .price-main,
    .price-cents{
      color:var(--primary-dark);
    }

    .card-icon{
      background:var(--primary-soft);
      color:var(--primary-dark);
    }

    .review-check{
      background:var(--primary);
    }

    .sticky-cta{
      border:1px solid #f3e8c8;
      background:linear-gradient(180deg, rgba(255,255,255,.98) 0%, rgba(255,247,214,.98) 100%);
    }

  </style>
</head>

<body>

  <div class="topbar">
    Oferta especial • acesso imediato ao guia digital
  </div>

  <div style="text-align:center; padding:80px;">
    <h1>
      Página com tema <span class="highlight">Dourado</span> aplicada com sucesso
    </h1>

    <p>Seu layout original permanece intacto. Apenas a cor foi alterada.</p>

    <button class="btn-primary" style="padding:15px 25px; border:none; border-radius:10px;">
      BOTÃO EXEMPLO
    </button>
  </div>

</body>
</html>
