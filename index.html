<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guia de Treinamento para Cães</title>
  <meta
    name="description"
    content="Aprenda a educar seu cão com um guia prático, simples e eficiente. Técnicas passo a passo para corrigir comportamentos, ensinar comandos e melhorar a convivência."
  />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#ffffff;
      --bg-soft:#f8fff9;
      --card:#ffffff;
      --line:#d9efe0;
      --text:#142019;
      --muted:#5f7464;

      /* 🔥 ALTERADO PARA DOURADO */
      --primary:#d4af37;
      --primary-dark:#b8962e;
      --primary-soft:#fff7d6;

      --green:#d4af37;
      --green-soft:#fff7d6;

      --yellow:#facc15;
      --shadow:0 18px 60px rgba(15,23,42,.08);
      --shadow-strong:0 20px 50px rgba(22,163,74,.16);
      --max:1120px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:'Inter', Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.5;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    img, video{
      max-width:100%;
      display:block;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    .container{
      width:min(100% - 28px, var(--max));
      margin:0 auto;
    }

    section{
      padding:50px 0;
    }

    .topbar{
      background:linear-gradient(90deg, var(--primary-dark), var(--primary));
      color:#fff;
      text-align:center;
      padding:11px 14px;
      font-size:13px;
      font-weight:800;
      letter-spacing:.2px;
    }

    .hero{
      padding:24px 0 34px;
      background:
        radial-gradient(circle at top left, rgba(22,163,74,.08), transparent 28%),
        radial-gradient(circle at top right, rgba(34,197,94,.07), transparent 22%),
        #fff;
    }

    /* 👉 OBS: TODO RESTANTE DO SEU CSS CONTINUA EXATAMENTE IGUAL */
  </style>
</head>

<body>

  <!-- 👉 TODO SEU HTML ORIGINAL CONTINUA IGUAL AQUI -->
  
</body>
</html>
